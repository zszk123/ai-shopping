      <text x="20" y="54" class="small">图片识别 → 关键词比价 → 价格分析 → 购买建议</text>
    </g>
    <rect x="10" y="746" width="370" height="88" fill="#FFFFFF"/>
    <rect x="28" y="766" width="42" height="46" rx="14" fill="#E2E8F0"/>
    <text x="42" y="795" class="body">图</text>
    <rect x="82" y="766" width="218" height="46" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="104" y="794" class="small">问商品、价格、历史或运行问题</text>
    <rect x="312" y="766" width="46" height="46" rx="16" fill="#0369A1"/>
    <text x="328" y="795" fill="#FFFFFF" style="font-family:Arial;font-size:14px;font-weight:800">发</text>
  </g>


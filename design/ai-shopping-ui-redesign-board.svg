    <rect x="10" y="10" width="370" height="824" rx="30" fill="#F8FAFC"/>
    <rect x="10" y="10" width="370" height="142" rx="30" fill="#0F172A"/>
    <text x="28" y="58" class="white" style="font-family:Arial,'Microsoft YaHei';font-size:24px;font-weight:800">AI 智能比价</text>
    <text x="28" y="84" fill="#CBD5E1" style="font-family:Arial,'Microsoft YaHei';font-size:12px">拍照、链接、关键词，一次找低价可信商品</text>
    <rect x="28" y="108" width="334" height="48" rx="16" fill="#FFFFFF"/>
    <circle cx="52" cy="132" r="8" stroke="#0369A1" stroke-width="3"/>
    <text x="72" y="137" class="small">搜索商品名称、品牌或型号</text>

    <rect x="28" y="176" width="334" height="142" rx="20" fill="#0369A1"/>
    <text x="52" y="216" fill="#FFFFFF" style="font-family:Arial,'Microsoft YaHei';font-size:22px;font-weight:800">拍照识图比价</text>
    <text x="52" y="244" fill="#DBEAFE" style="font-family:Arial,'Microsoft YaHei';font-size:13px">上传商品图，AI 自动识别并找同款</text>
    <rect x="52" y="266" width="108" height="34" rx="17" fill="#FFFFFF"/>
    <text x="78" y="288" fill="#0369A1" style="font-family:Arial,'Microsoft YaHei';font-size:13px;font-weight:700">开始识别</text>
    <rect x="274" y="204" width="58" height="58" rx="18" fill="#0F172A" opacity="0.28"/>
    <path d="M288 236l14-18 14 18 8-10 12 20h-56l8-10z" fill="#FFFFFF"/>

    <rect x="28" y="342" width="158" height="116" rx="18" fill="#FFFFFF"/>
    <rect x="50" y="366" width="42" height="42" rx="12" fill="#DCFCE7"/>
    <text x="104" y="390" class="h2">链接比价</text>
    <text x="50" y="430" class="small">粘贴商品链接</text>
    <rect x="204" y="342" width="158" height="116" rx="18" fill="#FFFFFF"/>
    <rect x="226" y="366" width="42" height="42" rx="12" fill="#FEF3C7"/>
    <text x="280" y="390" class="h2">关键词</text>
    <text x="226" y="430" class="small">按型号找同款</text>

    <text x="28" y="502" class="h2">今日推荐工作流</text>
    <rect x="28" y="522" width="334" height="74" rx="18" fill="#FFFFFF"/>
    <circle cx="58" cy="559" r="16" fill="#0D9488"/>
    <text x="84" y="552" class="body">先识别商品主体，再召回同款</text>

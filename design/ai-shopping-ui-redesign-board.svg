    <rect x="28" y="606" width="334" height="70" rx="18" fill="#FFFFFF"/>
    <text x="50" y="634" class="body">移动端优先，返回行为可预期</text>
    <text x="50" y="656" class="small">浏览器返回、App 返回都不丢状态</text>

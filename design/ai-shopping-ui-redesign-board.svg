<svg width="1920" height="1180" viewBox="0 0 1920 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:34px;font-weight:800;fill:#020617}
      .h1{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:24px;font-weight:800;fill:#020617}
      .h2{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:17px;font-weight:700;fill:#0F172A}
      .body{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:13px;font-weight:500;fill:#334155}
      .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:11px;font-weight:500;fill:#64748B}
      .tiny{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:9px;font-weight:600;fill:#64748B}
      .price{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:21px;font-weight:800;fill:#DC2626}
      .white{fill:#FFFFFF}
      .muted{fill:#F8FAFC}
      .line{stroke:#E2E8F0;stroke-width:1}
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1920" height="1180" fill="#EEF3F8"/>

  <text x="72" y="74" class="title">AI 智能比价助手 UI Redesign</text>
  <text x="72" y="106" class="body">Design system generated with ui-ux-pro-max. Flat, touch-first, professional ecommerce assistant experience.</text>

  <rect x="72" y="132" width="1776" height="112" rx="20" fill="#FFFFFF"/>
  <text x="104" y="168" class="h2">Design Tokens</text>
  <g transform="translate(104 188)">
    <rect width="116" height="32" rx="8" fill="#0F172A"/><text x="132" y="21" class="small">Primary #0F172A</text>
    <rect x="282" width="116" height="32" rx="8" fill="#0369A1"/><text x="414" y="21" class="small">Accent #0369A1</text>
    <rect x="564" width="116" height="32" rx="8" fill="#0D9488"/><text x="696" y="21" class="small">Trust #0D9488</text>
    <rect x="846" width="116" height="32" rx="8" fill="#DC2626"/><text x="978" y="21" class="small">Price #DC2626</text>
    <rect x="1128" width="116" height="32" rx="8" fill="#F8FAFC" stroke="#E2E8F0"/><text x="1260" y="21" class="small">Surface #F8FAFC</text>
    <text x="1480" y="21" class="small">Typography: Rubik / Nunito Sans style, Flutter fallback: system sans</text>
  </g>

  <!-- Phone 1 Home -->

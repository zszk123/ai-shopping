    <rect x="48" y="146" width="32" height="32" rx="10" fill="#E0F2FE"/>
    <text x="94" y="150" class="body">iPhone 16 256G</text>
    <text x="94" y="174" class="small">图片比价｜2小时前</text>
    <text x="304" y="166" class="h2">›</text>
    <rect x="28" y="214" width="334" height="82" rx="18" fill="#FFFFFF"/>
    <rect x="48" y="240" width="32" height="32" rx="10" fill="#FEF3C7"/>
    <text x="94" y="244" class="body">Sony WH-1000XM5</text>
    <text x="94" y="268" class="small">关键词搜索｜昨天</text>
    <text x="304" y="260" class="h2">›</text>
    <rect x="28" y="328" width="334" height="128" rx="20" fill="#0F172A"/>
    <text x="52" y="366" fill="#FFFFFF" style="font-family:Arial,'Microsoft YaHei';font-size:20px;font-weight:800">本月帮你省钱</text>
    <text x="52" y="412" fill="#FFFFFF" style="font-family:Arial,'Microsoft YaHei';font-size:34px;font-weight:900">¥728</text>
    <text x="190" y="412" fill="#CBD5E1" style="font-family:Arial,'Microsoft YaHei';font-size:12px">基于最低可信价估算</text>
    <text x="28" y="504" class="h2">体验规则</text>
    <rect x="28" y="524" width="334" height="70" rx="18" fill="#FFFFFF"/>
    <text x="50" y="552" class="body">空状态必须给下一步行动</text>

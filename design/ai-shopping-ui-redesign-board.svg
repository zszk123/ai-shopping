    <text x="84" y="660" class="small">默认优先展示低价且靠谱的店铺</text>

    <rect x="10" y="766" width="370" height="68" rx="0" fill="#FFFFFF"/>
    <text x="48" y="805" fill="#0369A1" style="font-family:Arial;font-size:11px;font-weight:800">首页</text>
    <text x="128" y="805" class="tiny">历史</text>
    <text x="212" y="805" class="tiny">AI客服</text>
    <text x="306" y="805" class="tiny">我的</text>

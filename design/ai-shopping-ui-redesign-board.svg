  <g transform="translate(1422 292)" filter="url(#softShadow)">
    <rect width="390" height="844" rx="38" fill="#0F172A"/>
    <rect x="10" y="10" width="370" height="824" rx="30" fill="#F8FAFC"/>
    <rect x="10" y="10" width="370" height="88" rx="30" fill="#FFFFFF"/>

<svg width="1920" height="1180" viewBox="0 0 1920 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:34px;font-weight:800;fill:#020617}
      .sub{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:14px;font-weight:500;fill:#64748B}
      .h1{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:26px;font-weight:900;fill:#020617}
      .h2{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:17px;font-weight:800;fill:#0F172A}
      .body{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:13px;font-weight:500;fill:#334155}
      .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:11px;font-weight:500;fill:#64748B}
      .btn{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:14px;font-weight:800;fill:#FFFFFF}
      .link{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:13px;font-weight:700;fill:#0369A1}
      .error{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:12px;font-weight:700;fill:#DC2626}
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1920" height="1180" fill="#EEF3F8"/>
  <text x="72" y="74" class="title">AI 比价系统登录 / 注册 UI 设计</text>
  <text x="72" y="106" class="sub">Auth is the first trust moment. Keep it fast, mobile-first, and clear about why login is useful.</text>

  <rect x="72" y="132" width="1776" height="112" rx="20" fill="#FFFFFF"/>
  <text x="104" y="168" class="h2">Auth UX Rules</text>
  <text x="104" y="198" class="body">1. 必须先登录再使用：比价、历史、客服、价格提醒都进入统一账号体系。</text>
  <text x="660" y="198" class="body">2. 手机号输入用数字键盘，错误提示必须具体。</text>
  <text x="1088" y="198" class="body">3. 登录/注册共用视觉结构，减少学习成本。</text>

  <!-- Phone 1 Login -->
  <g transform="translate(72 292)" filter="url(#softShadow)">
    <rect width="390" height="844" rx="38" fill="#0F172A"/>
    <rect x="10" y="10" width="370" height="824" rx="30" fill="#F8FAFC"/>
    <rect x="10" y="10" width="370" height="246" rx="30" fill="#0F172A"/>
    <circle cx="72" cy="78" r="24" fill="#0369A1"/>
    <path d="M58 80l14-18 17 24h-30l-8 10h42" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="28" y="132" fill="#FFFFFF" style="font-family:Arial,'Microsoft YaHei';font-size:28px;font-weight:900">欢迎回来</text>
    <text x="28" y="164" fill="#CBD5E1" style="font-family:Arial,'Microsoft YaHei';font-size:13px">登录后保存比价历史、客服记忆和价格提醒</text>
    <rect x="28" y="196" width="104" height="28" rx="14" fill="#DCFCE7"/>
    <text x="46" y="215" fill="#047857" style="font-family:Arial,'Microsoft YaHei';font-size:11px;font-weight:800">可信低价</text>
    <rect x="144" y="196" width="104" height="28" rx="14" fill="#E0F2FE"/>
    <text x="162" y="215" fill="#0369A1" style="font-family:Arial,'Microsoft YaHei';font-size:11px;font-weight:800">AI 识图</text>

    <rect x="28" y="286" width="334" height="64" rx="18" fill="#FFFFFF"/>
    <text x="52" y="310" class="small">手机号</text>
    <text x="52" y="334" class="body">138 0000 0000</text>
    <rect x="28" y="366" width="334" height="64" rx="18" fill="#FFFFFF"/>
    <text x="52" y="390" class="small">密码</text>
    <text x="52" y="414" class="body">••••••••</text>
    <text x="266" y="456" class="link">忘记密码？</text>
    <rect x="28" y="486" width="334" height="54" rx="18" fill="#0369A1"/>
    <text x="164" y="520" class="btn">登录</text>
    <rect x="28" y="556" width="334" height="50" rx="16" fill="#FFFFFF" stroke="#0369A1"/>
    <text x="130" y="587" class="link">手机号验证码登录</text>
    <text x="86" y="648" class="small">还没有账号？</text>
    <text x="168" y="648" class="link">立即注册</text>
  </g>

  <!-- Phone 2 Register -->
  <g transform="translate(522 292)" filter="url(#softShadow)">
    <rect width="390" height="844" rx="38" fill="#0F172A"/>
    <rect x="10" y="10" width="370" height="824" rx="30" fill="#F8FAFC"/>
    <rect x="10" y="10" width="370" height="184" rx="30" fill="#0F172A"/>
    <text x="28" y="76" fill="#FFFFFF" style="font-family:Arial,'Microsoft YaHei';font-size:28px;font-weight:900">创建账号</text>
    <text x="28" y="108" fill="#CBD5E1" style="font-family:Arial,'Microsoft YaHei';font-size:13px">同步历史记录，后续可做降价提醒</text>
    <rect x="28" y="224" width="334" height="64" rx="18" fill="#FFFFFF"/>
    <text x="52" y="248" class="small">昵称</text>
    <text x="52" y="272" class="body">nick6615578309</text>
    <rect x="28" y="304" width="334" height="64" rx="18" fill="#FFFFFF"/>
    <text x="52" y="328" class="small">手机号</text>
    <text x="52" y="352" class="body">请输入 11 位手机号</text>
    <rect x="28" y="384" width="334" height="64" rx="18" fill="#FFFFFF"/>
    <text x="52" y="408" class="small">密码</text>
    <text x="52" y="432" class="body">至少 6 位</text>
    <rect x="28" y="464" width="334" height="64" rx="18" fill="#FFFFFF"/>
    <text x="52" y="488" class="small">确认密码</text>
    <text x="52" y="512" class="body">再次输入密码</text>
    <rect x="28" y="558" width="334" height="54" rx="18" fill="#0369A1"/>
    <text x="154" y="592" class="btn">注册并登录</text>
    <text x="82" y="654" class="small">已有账号？</text>
    <text x="154" y="654" class="link">返回登录</text>
    <rect x="28" y="704" width="334" height="58" rx="18" fill="#FFFFFF"/>
    <text x="52" y="730" class="body">注册后可使用 AI 客服历史记忆</text>
    <text x="52" y="750" class="small">后续推荐会结合你的预算和偏好</text>
  </g>

  <!-- Phone 3 Login error -->
  <g transform="translate(972 292)" filter="url(#softShadow)">
    <rect width="390" height="844" rx="38" fill="#0F172A"/>
    <rect x="10" y="10" width="370" height="824" rx="30" fill="#F8FAFC"/>
    <rect x="10" y="10" width="370" height="196" rx="30" fill="#0F172A"/>
    <text x="28" y="76" fill="#FFFFFF" style="font-family:Arial,'Microsoft YaHei';font-size:28px;font-weight:900">账号登录</text>
    <text x="28" y="108" fill="#CBD5E1" style="font-family:Arial,'Microsoft YaHei';font-size:13px">继续查看你的比价记录</text>
    <rect x="28" y="236" width="334" height="64" rx="18" fill="#FFFFFF"/>
    <text x="52" y="260" class="small">手机号</text>
    <text x="52" y="284" class="body">138 0000 0000</text>
    <rect x="28" y="316" width="334" height="64" rx="18" fill="#FFFFFF" stroke="#DC2626"/>
    <text x="52" y="340" class="small">密码</text>
    <text x="52" y="364" class="body">••••••••</text>
    <rect x="28" y="398" width="334" height="48" rx="16" fill="#FEE2E2"/>
    <text x="52" y="427" class="error">手机号或密码不正确，请检查后重试</text>
    <rect x="28" y="476" width="334" height="54" rx="18" fill="#0369A1"/>
    <text x="154" y="510" class="btn">重新登录</text>
    <rect x="28" y="546" width="334" height="50" rx="16" fill="#FFFFFF" stroke="#0369A1"/>
    <text x="136" y="577" class="link">找回密码</text>
    <rect x="28" y="636" width="334" height="92" rx="20" fill="#FFFFFF"/>
    <text x="52" y="670" class="h2">为什么建议登录？</text>
    <text x="52" y="698" class="small">登录后可以保存历史、做价格提醒、让 AI 客服记住偏好。</text>
  </g>

  <!-- Phone 4 Login value -->
  <g transform="translate(1422 292)" filter="url(#softShadow)">
    <rect width="390" height="844" rx="38" fill="#0F172A"/>
    <rect x="10" y="10" width="370" height="824" rx="30" fill="#F8FAFC"/>
    <rect x="10" y="10" width="370" height="242" rx="30" fill="#0F172A"/>
    <text x="28" y="76" fill="#FFFFFF" style="font-family:Arial,'Microsoft YaHei';font-size:28px;font-weight:900">登录后开始比价</text>
    <text x="28" y="108" fill="#CBD5E1" style="font-family:Arial,'Microsoft YaHei';font-size:13px">统一账号保存历史、客服记忆和价格提醒</text>
    <rect x="28" y="286" width="334" height="74" rx="18" fill="#FFFFFF"/>
    <circle cx="62" cy="323" r="16" fill="#E0F2FE"/>
    <text x="94" y="318" class="body">账号保护</text>
    <text x="94" y="340" class="small">保存比价历史和 AI 客服上下文</text>
    <rect x="28" y="376" width="334" height="74" rx="18" fill="#FFFFFF"/>
    <circle cx="62" cy="413" r="16" fill="#DCFCE7"/>
    <text x="94" y="408" class="body">完整能力</text>
    <text x="94" y="430" class="small">图片比价、链接比价、关键词搜索、价格提醒</text>
    <rect x="28" y="488" width="334" height="54" rx="18" fill="#0369A1"/>
    <text x="146" y="522" class="btn">立即登录</text>
    <rect x="28" y="558" width="334" height="50" rx="16" fill="#FFFFFF" stroke="#0369A1"/>
    <text x="130" y="589" class="link">创建新账号</text>
    <text x="58" y="666" class="small">所有核心功能都需要登录后使用。</text>
  </g>
</svg>
